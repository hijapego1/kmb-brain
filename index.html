<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KMB Brain">
<meta name="theme-color" content="#A62F22">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>KMB Brain — HK Bus Planner</title>
<style>
  :root{
    --kmb:#C0392B; --kmb-dark:#97291E; --ink:#1f2329; --muted:#6b7280;
    --bg:#f5f6f8; --card:#ffffff; --line:#e6e8eb; --green:#0a8f4d; --amber:#c2780c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    background:linear-gradient(180deg,#B5342A 0%,#9E2A20 100%); color:#fff;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    position:sticky; top:0; z-index:20;
  }
  header h1{margin:0; font-size:19px; font-weight:800; letter-spacing:.2px}
  header p{margin:2px 0 0; font-size:12px; opacity:.9}
  .wrap{max-width:560px; margin:0 auto; padding:14px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px}
  .field{position:relative; margin-bottom:10px}
  .field label{display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin:0 0 5px 4px}
  .row{display:flex; gap:8px}
  input[type=text]{
    width:100%; padding:13px 12px; font-size:16px; border:1.5px solid var(--line);
    border-radius:12px; background:#fff; color:var(--ink); outline:none;
  }
  input[type=text]:focus{border-color:var(--kmb)}
  .gps{
    flex:0 0 auto; padding:0 14px; border:1.5px solid var(--line); border-radius:12px;
    background:#fff; font-size:18px; cursor:pointer;
  }
  .suggest{
    position:absolute; top:100%; left:0; right:0; z-index:30; background:#fff;
    border:1px solid var(--line); border-radius:12px; margin-top:4px; overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.12); display:none; max-height:260px; overflow-y:auto;
  }
  .suggest.show{display:block}
  .sg{padding:11px 13px; font-size:14px; border-bottom:1px solid var(--line); cursor:pointer; display:flex; gap:9px; align-items:center}
  .sg:last-child{border-bottom:none}
  .sg:active{background:#fde8e7}
  .sg .ic{font-size:16px}
  .sg .sub{color:var(--muted); font-size:12px}
  .swap{display:flex; justify-content:center; margin:-4px 0 6px}
  .swap button{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer}
  .go{
    width:100%; padding:15px; font-size:16px; font-weight:800; color:#fff;
    background:var(--kmb); border:none; border-radius:12px; cursor:pointer; margin-top:4px;
  }
  .go:active{background:var(--kmb-dark)}
  .go:disabled{opacity:.5}
  .status{font-size:13px; color:var(--muted); padding:6px 4px; text-align:center}
  .err{color:var(--kmb); font-weight:600}
  .opt{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:12px; overflow:hidden}
  .opt-head{display:flex; align-items:center; gap:10px; padding:13px 14px; border-bottom:1px solid var(--line)}
  .badge{font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; background:#eef1f4; color:#374151}
  .badge.direct{background:#e6f6ec; color:var(--green)}
  .badge.xfer{background:#fef3e2; color:var(--amber)}
  .opt-head .time{font-size:20px; font-weight:800; margin-left:auto}
  .opt-head .time small{font-size:12px; font-weight:600; color:var(--muted)}
  .legs{padding:6px 14px 14px}
  .leg{display:flex; gap:11px; padding:9px 0}
  .leg .rail{display:flex; flex-direction:column; align-items:center; width:30px; flex:0 0 30px}
  .dot{width:12px; height:12px; border-radius:50%; border:3px solid var(--kmb); background:#fff}
  .dot.walk{border-color:var(--muted)}
  .line{flex:1 0 auto; width:3px; background:var(--line); margin:2px 0; min-height:14px}
  .leg .body{flex:1; padding-top:-2px}
  .leg .title{font-size:14px; font-weight:700}
  .leg .rt{display:inline-block; background:var(--kmb); color:#fff; font-weight:800; font-size:13px; padding:1px 8px; border-radius:6px; margin-right:6px}
  .leg .meta{font-size:12.5px; color:var(--muted); margin-top:2px}
  .eta{font-weight:700}
  .eta.soon{color:var(--kmb)} .eta.ok{color:var(--green)} .eta.none{color:var(--muted)}
  .pill{display:inline-block; font-size:11px; background:#eef1f4; color:#374151; padding:1px 7px; border-radius:999px; margin-left:6px}
  .footer{font-size:11px; color:var(--muted); text-align:center; padding:6px 14px 24px; line-height:1.5}
  .footer a{color:var(--kmb)}
  .spin{display:inline-block; width:15px; height:15px; border:2.5px solid #ddd; border-top-color:var(--kmb); border-radius:50%; animation:s .8s linear infinite; vertical-align:-3px; margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  .progress{height:6px; background:var(--line); border-radius:6px; overflow:hidden; margin:8px 0}
  .progress > i{display:block; height:100%; background:var(--kmb); width:0%; transition:width .3s}
  .hint{font-size:12px;color:var(--muted);margin:2px 4px 0}
  .hbtns{display:flex;gap:8px;flex:0 0 auto}
  .hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.55);border-radius:10px;padding:6px 11px;font-size:14px;font-weight:800;cursor:pointer}
  /* welcome / settings overlay */
  .welcome{position:fixed;inset:0;z-index:100;background:rgba(20,10,8,.55);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:18px}
  .welcome-card{background:var(--card);border-radius:22px;max-width:460px;width:100%;padding:22px 20px 20px;
    max-height:92vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.4)}
  .w-emoji{font-size:40px;text-align:center;line-height:1}
  .welcome-card h2{margin:8px 0 2px;text-align:center;font-size:21px;font-weight:850}
  .welcome-card .w-sub{margin:0 0 14px;text-align:center;font-size:13px;color:var(--muted)}
  .w-section{margin:16px 0}
  .w-label{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:0 2px 8px}
  .w-langs{display:flex;gap:10px}
  .w-lang{flex:1;padding:14px;border:2px solid var(--line);border-radius:14px;background:#fff;font-size:16px;font-weight:700;cursor:pointer;color:var(--ink)}
  .w-lang.sel{border-color:var(--kmb);background:#fdecea;color:var(--kmb)}
  .w-tiers{display:flex;flex-direction:column;gap:10px}
  .w-tier{display:flex;align-items:center;gap:13px;text-align:left;padding:13px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;color:var(--ink)}
  .w-tier.sel{border-color:var(--kmb);background:#fdecea}
  .w-tier-emo{font-size:26px;flex:0 0 auto}
  .w-tier-name{font-weight:800;font-size:15px}
  .w-tier-desc{display:block;font-weight:500;font-size:12.5px;color:var(--muted);margin-top:1px}
  .w-tier .w-tier-txt{display:flex;flex-direction:column}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0; display:flex; align-items:flex-start; justify-content:space-between; gap:10px">
    <div>
      <h1>🚌 KMB Brain</h1>
      <p id="subtitle">HK bus route planner · live KMB ETA · Phase 1+2</p>
    </div>
    <div class="hbtns">
      <button id="setBtn" class="hbtn" title="Settings">⚙</button>
      <button id="langBtn" class="hbtn" title="Switch language">中</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card" id="searchCard">
    <div class="field">
      <label id="lblFrom">From</label>
      <div class="row">
        <input type="text" id="fromIn" placeholder="" autocomplete="off">
        <button class="gps" id="gpsBtn" title="Use my location">📍</button>
      </div>
      <div class="suggest" id="fromSg"></div>
    </div>
    <div class="swap"><button id="swapBtn" title="Swap">⇅</button></div>
    <div class="field">
      <label id="lblTo">To</label>
      <input type="text" id="toIn" placeholder="" autocomplete="off">
      <div class="suggest" id="toSg"></div>
    </div>
    <button class="go" id="goBtn">Plan my trip</button>
    <div class="hint" id="resolveHint"></div>
  </div>

  <div id="status" class="status"></div>
  <div id="results"></div>

  <div class="footer" id="footer"></div>
</div>

<div id="welcome" class="welcome" style="display:none">
  <div class="welcome-card">
    <div class="w-emoji">🚌</div>
    <h2 id="wTitle">Welcome to KMB Brain</h2>
    <p class="w-sub" id="wSub">Quick setup — change anytime with ⚙</p>
    <div class="w-section">
      <div class="w-label" id="wLangLabel">Language</div>
      <div class="w-langs">
        <button class="w-lang" data-lang="en">English</button>
        <button class="w-lang" data-lang="zh">中文</button>
      </div>
    </div>
    <div class="w-section">
      <div class="w-label" id="wWalkLabel">How far will you walk to change buses?</div>
      <div class="w-tiers">
        <button class="w-tier" data-tier="stopper"><span class="w-tier-emo">🧍</span><span class="w-tier-txt"><span class="w-tier-name" data-wk="stopper-n"></span><span class="w-tier-desc" data-wk="stopper-d"></span></span></button>
        <button class="w-tier" data-tier="mild"><span class="w-tier-emo">🚶</span><span class="w-tier-txt"><span class="w-tier-name" data-wk="mild-n"></span><span class="w-tier-desc" data-wk="mild-d"></span></span></button>
        <button class="w-tier" data-tier="moon"><span class="w-tier-emo">🌝</span><span class="w-tier-txt"><span class="w-tier-name" data-wk="moon-n"></span><span class="w-tier-desc" data-wk="moon-d"></span></span></button>
      </div>
    </div>
    <button class="go" id="wStart">Start</button>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   KMB Brain — Phase 1 (planner) + Phase 2 (live ETA)
   Pure client-side. Calls KMB open-data API from the browser.
   ============================================================ */
const GOV = "https://data.etabus.gov.hk"; // upstream KMB open data
const KMB = "/v1/transport/kmb";          // path prefix on the gov API

// ---- tunables (the "feel" of the planner) ----
const WALK_MPM   = 80;    // walking speed, metres/minute (~4.8 km/h)
const NEAR_N     = 6;     // how many candidate stops per end
const MIN_PER_STOP = 1.8; // estimated minutes of riding per stop
const ASSUMED_WAIT = 6;   // assumed wait (min) before we have live ETA
const MAX_TRANSFERS = 5;  // up to 5 transfers (6 bus legs) in the search
// Walk tolerance is user-chosen (welcome screen). These two are set by the tier:
let MAX_WALK  = 700;      // max metres to a boarding/alighting stop
let XFER_WALK = 300;      // max metres to walk between stops at an interchange
const WALK_TIERS = {
  stopper: { xfer:100,  walk:400  },   // 🧍 same stop only
  mild:    { xfer:300,  walk:700  },   // 🚶 a short hop
  moon:    { xfer:1000, walk:1200 },   // 🌝 happy to stroll
};
let walkTier = localStorage.getItem("kmbWalk") || "mild";
function applyWalkTier(tier){
  if(!WALK_TIERS[tier]) tier="mild";
  walkTier=tier; XFER_WALK=WALK_TIERS[tier].xfer; MAX_WALK=WALK_TIERS[tier].walk;
  localStorage.setItem("kmbWalk",tier);
}
const TOP_SHOW   = 3;     // options to display
const TOP_ETA    = 6;     // options to fetch live ETA for
const NO_BUS_WAIT = 30;   // penalty wait (min) for a leg with no live bus (fallback only)
const REPLAN_MAX  = 4;    // times to re-plan, excluding routes not running right now
const GPS_MAX_AGE = 120000; // reuse a GPS fix up to 2 min old (instant + still accurate)
const GPS_TIMEOUT = 10000;  // give up on a fresh fix after 10s, then fall back

// ---- state ----
let stops = new Map();        // stopId -> {name,nameTc,lat,lng}
let routeStopList = new Map();// rk -> [stopId,...] (in seq order)
let routeSeq = new Map();     // rk -> Map(stopId -> index)

let routeMeta = new Map();    // rk -> {route,bound,st,orig,dest}

let lastOptions = null;           // last results, for re-render on language switch

let lang = localStorage.getItem("kmbLang") || "en";

// rk helpers
const mkRk = (route,bound,st) => route+"|"+bound+"|"+st;
const rkParts = rk => { const p = rk.split("|"); return {route:p[0],bound:p[1],st:p[2]}; };
const dirWord = b => b==="I" ? "inbound" : "outbound";

// ---- geo ----
function haversine(aLat,aLng,bLat,bLng){
  const R=6371000, toR=Math.PI/180;
  const dLat=(bLat-aLat)*toR, dLng=(bLng-aLng)*toR;
  const s=Math.sin(dLat/2)**2 + Math.cos(aLat*toR)*Math.cos(bLat*toR)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

// ---- spatial grid: bucket stops into ~275m cells so "stops near X" is fast ----
const CELL = 0.0025; // degrees (~275m)
let grid = new Map();
function buildGrid(){
  grid = new Map();
  for(const [id,s] of stops){
    const k = Math.floor(s.lat/CELL)+","+Math.floor(s.lng/CELL);
    if(!grid.has(k)) grid.set(k,[]);
    grid.get(k).push(id);
  }
}
// stops within radiusM of (lat,lng): scan enough grid rings to cover the radius
function nearbyStops(lat,lng,radiusM){
  const ci=Math.floor(lat/CELL), cj=Math.floor(lng/CELL), out=[];
  const rings=Math.max(1, Math.ceil(radiusM/240)); // CELL ≈ 240–275m, so this covers the radius
  for(let di=-rings;di<=rings;di++) for(let dj=-rings;dj<=rings;dj++){
    const arr=grid.get((ci+di)+","+(cj+dj)); if(!arr) continue;
    for(const id of arr){ const s=stops.get(id); const d=haversine(lat,lng,s.lat,s.lng); if(d<=radiusM) out.push({stopId:id,dist:d}); }
  }
  return out;
}

function hkToday(){
  // YYYY-MM-DD in Hong Kong time
  return new Date(Date.now()+8*3600*1000).toISOString().slice(0,10);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function fetchOnce(u, ms){
  return new Promise((resolve,reject)=>{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(), ms||35000);
    fetch(u,{signal:ctrl.signal, cache:"no-store"})
      .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(d=>{ clearTimeout(t); resolve(d); })
      .catch(e=>{ clearTimeout(t); reject(e); });
  });
}
// Ways to reach a KMB gov path, best -> last resort:
//  1. same-origin proxy  /api/kmb?path=...  (server-side; only exists on Vercel) — reliable, no CORS, cached
//  2. direct to gov                          — works only if gov allows browser CORS
//  3. public CORS proxies                    — last resort, can be rate-limited
function urlBuilders(path){
  const direct = GOV + path;
  return [
    "/api/kmb?path=" + encodeURIComponent(path),
    direct,
    "https://corsproxy.io/?url=" + encodeURIComponent(direct),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(direct),
  ];
}
async function fetchKmb(path, label){
  const urls = urlBuilders(path);
  let lastErr;
  for(let i=0;i<urls.length;i++){
    try{ const d = await fetchOnce(urls[i]); if(d) return d; }
    catch(e){ lastErr=e; if(i<urls.length-1) await sleep(300); }
  }
  throw new Error((label||"data")+": "+((lastErr&&lastErr.message)||"network/CORS blocked"));
}

function buildIndexes(rawStops, rawRouteStops, rawRoutes){
  stops.clear(); routeStopList.clear(); routeSeq.clear(); stopRoutes.clear(); routeMeta.clear();
  for(const s of rawStops){
    stops.set(s.stop, {name:s.name_en, nameTc:s.name_tc, lat:+s.lat, lng:+s.long});
  }
  for(const r of rawRoutes){
    routeMeta.set(mkRk(r.route, r.bound, String(r.service_type)),
      {route:r.route, bound:r.bound, st:String(r.service_type),
       orig:r.orig_en, dest:r.dest_en, origTc:r.orig_tc, destTc:r.dest_tc});
  }
  // route-stop comes pre-sorted by route/bound/seq but we sort to be safe
  const tmp = new Map();
  for(const rs of rawRouteStops){
    const rk = mkRk(rs.route, rs.bound, String(rs.service_type));
    if(!tmp.has(rk)) tmp.set(rk, []);
    tmp.get(rk).push({stop:rs.stop, seq:+rs.seq});
  }
  for(const [rk, arr] of tmp){
    arr.sort((a,b)=>a.seq-b.seq);
    const list = arr.map(x=>x.stop);
    routeStopList.set(rk, list);
    const sm = new Map();
    list.forEach((sid,i)=>{ sm.set(sid,i);
      if(!stopRoutes.has(sid)) stopRoutes.set(sid,new Set());
      stopRoutes.get(sid).add(rk);
    });
    routeSeq.set(rk, sm);
  }
  buildGrid(); // spatial index for nearby-stop interchanges
}

// ============================================================
//  RESOLVE TEXT -> COORDS  (gazetteer + stop-name search)
// ============================================================
function resolveText(text){
  const raw = text.trim(); const q = raw.toLowerCase();
  if(!q) return null;
  if(GAZ[q]) return {lat:GAZ[q][0], lng:GAZ[q][1], label: /[a-z]/.test(q)?title(raw):raw};
  // partial gazetteer (works for English and Chinese keys)
  for(const k in GAZ){ if(k.startsWith(q) || q.startsWith(k)) return {lat:GAZ[k][0],lng:GAZ[k][1],label: /[a-z]/.test(k)?title(k):k}; }
  // stop-name search (English OR Chinese): average matching stops' coords (cluster centre)
  const m=[]; for(const [id,s] of stops){ if(s.name.toLowerCase().includes(q) || (s.nameTc && s.nameTc.includes(raw))) m.push(s); if(m.length>=8) break; }
  if(m.length){
    const lat=m.reduce((a,s)=>a+s.lat,0)/m.length, lng=m.reduce((a,s)=>a+s.lng,0)/m.length;
    return {lat,lng,label: lang==="zh"?(m[0].nameTc||m[0].name):m[0].name};
  }
  return null;
}
function title(s){return s.replace(/\b\w/g,c=>c.toUpperCase());}

// suggestions: gazetteer + top stop names (English or Chinese)
function suggestList(text){
  const raw=text.trim(); const q=raw.toLowerCase(); if(q.length<1) return [];
  const out=[];
  for(const k in GAZ){ if(k.includes(q)){ out.push({ic:"📍",label:/[a-z]/.test(k)?title(k):k,sub:t("district"),lat:GAZ[k][0],lng:GAZ[k][1]}); } if(out.length>=5)break; }
  if(ready){
    for(const [id,s] of stops){
      if(s.name.toLowerCase().includes(q) || (s.nameTc && s.nameTc.includes(raw))){
        const label = lang==="zh"?(s.nameTc||s.name):s.name;
        const other = lang==="zh"?s.name:s.nameTc;
        out.push({ic:"🚏",label,sub:t("kmbStop")+" · "+other,lat:s.lat,lng:s.lng});
      }
      if(out.length>=9) break;
    }
  }
  return out.slice(0,9);
}

// ============================================================
//  NEAREST STOPS
// ============================================================
function nearestStops(lat,lng,maxM,n){
  const arr=[];
  for(const [id,s] of stops){
    const d=haversine(lat,lng,s.lat,s.lng);
    if(d<=maxM) arr.push({stopId:id, dist:d});
  }
  arr.sort((a,b)=>a.dist-b.dist);
  return arr.slice(0,n);
}

// ============================================================
//  ROUTE SEARCH  (direct + 1-transfer, same-stop interchange)
// ============================================================
function routesForStops(cands){ // Map rk -> {stopId,dist,seq} best (closest) per route
  const m=new Map();
  for(const c of cands){
    const set=stopRoutes.get(c.stopId); if(!set) continue;
    for(const rk of set){
      const seq=routeSeq.get(rk).get(c.stopId);
      const prev=m.get(rk);
      if(!prev || c.dist<prev.dist) m.set(rk,{stopId:c.stopId,dist:c.dist,seq});
    }
  }
  return m;
}

// Round-based multi-transfer search (RAPTOR-style). Each "round" = one more bus
// trip. arr[k] = cheapest cost (estimated minutes from origin) to reach a stop
// using at most k bus trips; par[k] records how, for path reconstruction.
function plan(originLL, destLL, blocked){
  blocked = blocked || new Set();           // rk's to skip (not running right now)
  const oCands = nearestStops(originLL.lat,originLL.lng,MAX_WALK,NEAR_N);
  const dCands = nearestStops(destLL.lat,destLL.lng,MAX_WALK,NEAR_N);
  if(!oCands.length) return {error:t("noOrig")};
  if(!dCands.length) return {error:t("noDest")};

  const K = MAX_TRANSFERS + 1;            // max bus legs
  const destWalkM = new Map();            // dest candidate stopId -> walk metres to destination
  for(const c of dCands) destWalkM.set(c.stopId, c.dist);

  const arr=[new Map()], par=[new Map()]; // arr[k]: stopId->cost(min); par[k]: stopId->parent
  for(const c of oCands){
    const w=c.dist/WALK_MPM;
    if(!arr[0].has(c.stopId) || w<arr[0].get(c.stopId)){ arr[0].set(c.stopId,w); par[0].set(c.stopId,{via:"origin",walkM:c.dist}); }
  }
  let marked=new Set(arr[0].keys());

  for(let k=1;k<=K;k++){
    arr[k]=new Map(arr[k-1]); par[k]=new Map(par[k-1]);
    const improved=new Set();
    const routesToScan=new Set();
    for(const sid of marked){ const set=stopRoutes.get(sid); if(set) for(const rk of set) routesToScan.add(rk); }
    // ride each candidate route once, boarding at the cheapest marked stop seen so far
    for(const rk of routesToScan){
      if(blocked.has(rk)) continue;          // skip routes known not to be running now
      const list=routeStopList.get(rk);
      let boardCost=Infinity, boardStop=null, boardSeq=-1;
      for(let i=0;i<list.length;i++){
        const sid=list[i];
        if(boardStop!==null){
          const cand=boardCost + ASSUMED_WAIT + (i-boardSeq)*MIN_PER_STOP;
          if(cand < (arr[k].get(sid) ?? Infinity)){
            arr[k].set(sid,cand);
            par[k].set(sid,{via:"board",rk,boardStop,boardSeq,alightSeq:i});
            improved.add(sid);
          }
        }
        if(marked.has(sid)){                         // can start a new trip here (from prev round)
          const c=arr[k-1].get(sid);
          if(c!=null && c<boardCost){ boardCost=c; boardStop=sid; boardSeq=i; }
        }
      }
    }
    // foot transfers from stops improved this round (walking adds no trip)
    const foot=[];
    for(const sid of improved){
      const s=stops.get(sid); if(!s) continue;
      const base=arr[k].get(sid);
      for(const {stopId:Y,dist} of nearbyStops(s.lat,s.lng,XFER_WALK)){
        if(Y===sid) continue;
        const cand=base + dist/WALK_MPM;
        if(cand < (arr[k].get(Y) ?? Infinity)) foot.push([Y,cand,sid,dist]);
      }
    }
    for(const [Y,cand,fromStop,dist] of foot){
      if(cand < (arr[k].get(Y) ?? Infinity)){
        arr[k].set(Y,cand); par[k].set(Y,{via:"walk",fromStop,walkM:dist}); improved.add(Y);
      }
    }
    marked=improved;
    if(!marked.size){ for(let kk=k+1;kk<=K;kk++){ arr[kk]=arr[k]; par[kk]=par[k]; } break; }
  }

  // For each trip-count, the best reachable destination; keep journeys that improve on fewer trips.
  const bestDestAt=(k)=>{
    let bStop=null,bTotal=Infinity;
    for(const c of dCands){ const a=arr[k].get(c.stopId); if(a==null) continue;
      const tot=a + destWalkM.get(c.stopId)/WALK_MPM; if(tot<bTotal){ bTotal=tot; bStop=c.stopId; } }
    return bStop?{stop:bStop,total:bTotal}:null;
  };
  const journeys=[], seenSig=new Set(); let prevTotal=Infinity;
  for(let k=1;k<=K;k++){
    const b=bestDestAt(k); if(!b) continue;
    if(b.total >= prevTotal-0.01) continue;   // no real gain over a journey with fewer transfers
    prevTotal=b.total;
    const legs=reconstruct(b.stop,k,arr,par,destWalkM);
    if(!legs) continue;
    const sig=legs.map(l=>l.rk+"@"+l.board).join(">");
    if(seenSig.has(sig)) continue; seenSig.add(sig);
    journeys.push({type: legs.length>1?"transfer":"direct", legs});
  }
  if(!journeys.length) return {error:t("noCombo")};
  scoreAll(journeys);
  journeys.sort((a,b)=>a.totalMin-b.totalMin);
  return {options:journeys};
}

// Walk back through the parent pointers to build the leg list for a journey.
function reconstruct(destStop,K,arr,par,destWalkM){
  const acts=[]; let stop=destStop, k=K, guard=0;
  while(guard++<300){
    const p=par[k].get(stop); if(!p) return null;
    if(p.via==="origin"){ acts.push({t:"origin",walkM:p.walkM}); break; }
    if(p.via==="walk"){ acts.push({t:"walk",walkM:p.walkM}); stop=p.fromStop; continue; }
    if(p.via==="board"){ acts.push({t:"board",rk:p.rk,board:p.boardStop,alight:stop,nStops:p.alightSeq-p.boardSeq}); stop=p.boardStop; k--; if(k<0) return null; continue; }
    return null;
  }
  acts.reverse();
  const legs=[]; let pendingWalk=0;
  for(const a of acts){
    if(a.t==="origin") pendingWalk=a.walkM;
    else if(a.t==="walk") pendingWalk+=a.walkM;
    else if(a.t==="board"){
      if(legs.length===0) legs.push({kind:"bus",rk:a.rk,board:a.board,alight:a.alight,nStops:a.nStops,walkBoard:pendingWalk,walkAlight:0});
      else { legs[legs.length-1].walkAlight=pendingWalk; legs.push({kind:"bus",rk:a.rk,board:a.board,alight:a.alight,nStops:a.nStops,walkBoard:0,walkAlight:0}); }
      pendingWalk=0;
    }
  }
  if(!legs.length) return null;
  legs[legs.length-1].walkAlight = pendingWalk + (destWalkM.get(destStop)||0);
  return legs;
}

function multiRouteStops(cands){ // rk -> [{stopId,dist,seq}] all candidate stops on that route
  const m=new Map();
  for(const c of cands){
    const set=stopRoutes.get(c.stopId); if(!set) continue;
    for(const rk of set){
      const seq=routeSeq.get(rk).get(c.stopId);
      if(!m.has(rk)) m.set(rk,[]);
      m.get(rk).push({stopId:c.stopId,dist:c.dist,seq});
    }
  }
  return m;
}

function scoreAll(options){
  for(const o of options){
    let walkM=0, ride=0, wait=0, nBoard=0;
    for(const l of o.legs){
      walkM += (l.walkBoard||0) + (l.walkAlight||0);
      ride  += l.nStops*MIN_PER_STOP;
      l.waitMin = (l.waitMin!=null)? l.waitMin : ASSUMED_WAIT; // may be filled by ETA
      wait  += l.waitMin; nBoard++;
    }
    o.walkMin = walkM/WALK_MPM;
    o.rideMin = ride;
    o.waitMin = wait;
    o.totalMin = o.walkMin + o.rideMin + o.waitMin;
    o.nBoard = nBoard;
  }
}

// ============================================================
//  LIVE ETA (Phase 2) — refine waits, drop non-running routes, re-rank
// ============================================================
async function fetchEtaForStop(stopId){
  // returns array of rows, or null if the fetch itself failed (so we don't
  // mistake a network error for "no bus coming")
  try{ const j=await fetchKmb(KMB+"/stop-eta/"+stopId, "eta"); return j.data||[]; }
  catch(e){ return null; }
}
// For one route (rk) at a stop's ETA rows: upcoming minutes + any service remark.
function etaInfoFromRows(rows, rk){
  const {route,bound,st}=rkParts(rk);
  const now=Date.now(); const mins=[]; let rmk="", matched=false;
  for(const r of rows){
    if(r.route!==route || r.dir!==bound || String(r.service_type)!==st) continue;
    matched=true;
    if(lang==="zh"){ if(!rmk && r.rmk_tc) rmk=r.rmk_tc; } else { if(!rmk && r.rmk_en) rmk=r.rmk_en; }
    if(!r.eta) continue;
    const m=(new Date(r.eta).getTime()-now)/60000;
    if(m>=-1) mins.push(Math.max(0,Math.round(m)));
  }
  mins.sort((a,b)=>a-b);
  return {mins:mins.slice(0,3), rmk, matched};
}
// Fetch ETA for every boarding stop used by these options (cached across re-plans).
async function fetchEtaInto(options, cache){
  const need=new Set();
  for(const o of options) for(const l of o.legs) if(!cache.has(l.board)) need.add(l.board);
  await Promise.all([...need].map(async id=>{ cache.set(id, await fetchEtaForStop(id)); }));
}
// Apply live ETA to each leg.
//  - real ETA  -> waitMin = next arrival, live
//  - no ETA    -> noBus flag + heavy penalty wait (route not running now)
//  - fetch failed (rows null) -> leave as unknown, keep assumed wait
function applyEta(options, cache){
  for(const o of options){
    for(const l of o.legs){
      const rows=cache.get(l.board);
      if(rows==null){ l.etaList=null; l.noBus=false; continue; }
      const info=etaInfoFromRows(rows, l.rk);
      l.rmk=info.rmk;
      if(info.mins.length){ l.etaList=info.mins; l.waitMin=info.mins[0]; l.noBus=false; }
      else { l.etaList=[]; l.noBus=true; l.waitMin=NO_BUS_WAIT; }
    }
  }
  scoreAll(options);
}
const sigOf = o => o.legs.map(l=>l.rk+"@"+l.board).join(">");

  const cls=f<=2?"soon":"ok";
  const label = f===0? t("nowTxt") : t("next", f+" "+t("min"));
  const rest = arr.slice(1).map(x=>x+"").join(", ");
  return `<span class="eta ${cls}">${label}</span>`+(rest?` <span class="pill">${t("then",rest)}</span>`:"");
}

function renderOptions(options){
  lastOptions = options;  // remember for re-render on language switch
  const box=$("results"); box.innerHTML="";
  if(!options || !options.length){ return; }
  options.slice(0,TOP_SHOW).forEach((o,idx)=>{
    const el=document.createElement("div"); el.className="opt";
    const nT=o.legs.length-1;
    const badge = nT===0 ? `<span class="badge direct">${t("direct")}</span>` : `<span class="badge xfer">${t("xfers",nT)}</span>`;
    const rank = idx===0? `<span class="badge">${t("best")}</span>` : '';
    let legsHtml="";
    // start walk
    const firstWalk=o.legs[0].walkBoard;
    legsHtml+=legRow("walk", t("walkTo",stopName(o.legs[0].board)), `${walkMin(firstWalk)} ${t("min")} · ${fmtDist(firstWalk)}`, false);
    o.legs.forEach((l,i)=>{
      const {route}=rkParts(l.rk); const meta=routeMeta.get(l.rk)||{};
      const dest = (lang==="zh" ? (meta.destTc||meta.dest) : meta.dest) || "—";
      const title=`<span class="rt">${route}</span>${t("towards",dest)}`;
      const metaLine=`${etaText(l.etaList)} · ${t("ride", l.nStops, Math.round(l.nStops*MIN_PER_STOP))}`;
      legsHtml+=legRow("bus", title, metaLine, true);
      if(i<o.legs.length-1){
        const next=o.legs[i+1]; const w=l.walkAlight||0;
        const tMeta = (next.board!==l.alight && w>5)
          ? t("walkToBoard", walkMin(w), fmtDist(w), stopName(next.board))
          : t("changeHere");
        legsHtml+=legRow("walk", t("transferAt",stopName(l.alight)), tMeta, false);
      }
    });
    const lastWalk=o.legs[o.legs.length-1].walkAlight;
    legsHtml+=legRow("walk", t("walkDest"), `${walkMin(lastWalk)} ${t("min")} · ${fmtDist(lastWalk)}`, false, true);

    el.innerHTML=`
      <div class="opt-head">${rank}${badge}
        <span class="time">${Math.round(o.totalMin)}<small> ${t("min")}</small></span></div>
      <div class="legs">${legsHtml}</div>`;
    box.appendChild(el);
  });
}
function legRow(kind,title,meta,isBus,last){
  const dotCls=kind==="walk"?"dot walk":"dot";
  const line=last?"":'<div class="line"></div>';
  return `<div class="leg"><div class="rail"><div class="${dotCls}"></div>${line}</div>
    <div class="body"><div class="title">${title}</div><div class="meta">${meta}</div></div></div>`;
}
function stopName(id){ const s=stops.get(id); if(!s) return id; return lang==="zh"?(s.nameTc||s.name):s.name; }

// ============================================================
//  WIRE UP UI
// ============================================================
function setStatus(html){ $("status").innerHTML=html; }

function applyLang(){
  document.documentElement.lang = lang==="zh" ? "zh-HK" : "en";
  $("subtitle").textContent = t("subtitle");
  $("lblFrom").textContent  = t("from");
  $("lblTo").textContent    = t("to");
  $("fromIn").placeholder   = t("phFrom");
  $("toIn").placeholder     = t("phTo");
  $("goBtn").textContent    = t("go");
  $("footer").innerHTML     = t("footer");
  $("langBtn").textContent  = t("btn");
}
function toggleLang(){
  lang = (lang==="en") ? "zh" : "en";
  localStorage.setItem("kmbLang", lang);
  applyLang();
  if(lastOptions) renderOptions(lastOptions);
  else if(ready) setStatus(t("ready", stops.size.toLocaleString(), routeStopList.size.toLocaleString()));
}

// ---- welcome / settings overlay ----
let wSelLang, wSelTier;
function renderWelcome(){
  const W=WTXT[wSelLang]||WTXT.en;
  $("wTitle").textContent=W.title; $("wSub").textContent=W.sub;
  $("wLangLabel").textContent=W.lang; $("wWalkLabel").textContent=W.walk; $("wStart").textContent=W.start;
  document.querySelectorAll("#welcome [data-wk]").forEach(el=>{ el.textContent=W[el.getAttribute("data-wk")]||""; });
  document.querySelectorAll(".w-lang").forEach(b=>b.classList.toggle("sel", b.dataset.lang===wSelLang));
  document.querySelectorAll(".w-tier").forEach(b=>b.classList.toggle("sel", b.dataset.tier===wSelTier));
}
function showWelcome(){ wSelLang=lang; wSelTier=walkTier; renderWelcome(); $("welcome").style.display="flex"; }
function wireWelcome(){
  document.querySelectorAll(".w-lang").forEach(b=>b.onclick=()=>{ wSelLang=b.dataset.lang; renderWelcome(); });
  document.querySelectorAll(".w-tier").forEach(b=>b.onclick=()=>{ wSelTier=b.dataset.tier; renderWelcome(); });
  $("wStart").onclick=()=>{
    lang=wSelLang; localStorage.setItem("kmbLang",lang);
    applyWalkTier(wSelTier);
    localStorage.setItem("kmbSetup","1");
    applyLang(); $("welcome").style.display="none";
    if(lastOptions) renderOptions(lastOptions);
    else if(ready) setStatus(t("ready", stops.size.toLocaleString(), routeStopList.size.toLocaleString()));
  };
}

async function init(){
  applyWalkTier(walkTier);   // apply saved walk tier (or default 'mild')
  applyLang();
  wireWelcome();
  $("setBtn").onclick=showWelcome;
  if(!localStorage.getItem("kmbSetup")) showWelcome();   // first visit → welcome
  bindSuggest($("fromIn"),$("fromSg"),s=>fromSel=s,"from");
  bindSuggest($("toIn"),$("toSg"),s=>toSel=s,"to");
  $("swapBtn").onclick=()=>{
    const a=$("fromIn").value, b=$("toIn").value; $("fromIn").value=b; $("toIn").value=a;
    const tmp=fromSel; fromSel=toSel; toSel=tmp;
  };
  $("gpsBtn").onclick=()=>useGps();
  $("goBtn").onclick=runPlan;
  $("langBtn").onclick=toggleLang;

  setStatus(`<span class="spin"></span>${t("waking")}`);
  $("goBtn").disabled=true;
  try{
    await ensureData((msg,pct)=>{
      if(pct>=100){ setStatus(""); return; }
      setStatus(`<span class="spin"></span>${msg}<div class="progress"><i style="width:${pct}%"></i></div>`);
    });
    $("goBtn").disabled=false;
    setStatus(t("ready", stops.size.toLocaleString(), routeStopList.size.toLocaleString()));
  }catch(e){
    setStatus(`<span class="err">${t("loadFail",e.message)}</span><br>`+
      `<span style="font-size:12px;color:var(--muted)">${t("loadHint")}</span>`);
  }
}

function bindSuggest(input, box, onPick, which){
  let tmr=null;
  input.addEventListener("input",()=>{
    if(which==="from") fromSel=null; else toSel=null;
    clearTimeout(tmr);
    tmr=setTimeout(()=>{
      const list=suggestList(input.value);
      if(!list.length){ box.classList.remove("show"); box.innerHTML=""; return; }
      box.innerHTML=list.map((s,i)=>`<div class="sg" data-i="${i}"><span class="ic">${s.ic}</span><span><div>${s.label}</div><div class="sub">${s.sub}</div></span></div>`).join("");
      box.classList.add("show");
      [...box.children].forEach((ch,i)=>ch.onclick=()=>{
        input.value=list[i].label; onPick({lat:list[i].lat,lng:list[i].lng,label:list[i].label});
        box.classList.remove("show");
      });
    },120);
  });
  input.addEventListener("blur",()=>setTimeout(()=>box.classList.remove("show"),200));
}

function saveLastLoc(lat,lng){
  try{ localStorage.setItem("kmbLastLoc", JSON.stringify({lat,lng,ts:Date.now()})); }catch(e){}
}
function getLastLoc(){
  try{ const o=JSON.parse(localStorage.getItem("kmbLastLoc")); if(o&&isFinite(o.lat)&&isFinite(o.lng)&&o.ts) return o; }catch(e){}
  return null;
}
// (b) ask for a fix up to 2 min old → instant when you just used it, fresh when
// you've moved. If a fresh fix fails, fall back to the last known spot (clearly
// labelled with its age). If there's no fallback either, offer to ask again.
function useGps(retrying){
  if(!navigator.geolocation){ alert(t("noGeo")); return; }
  $("fromIn").value=t("locating");
  navigator.geolocation.getCurrentPosition(
    p=>{
      const lat=p.coords.latitude, lng=p.coords.longitude;
      fromSel={lat,lng,label:t("myLoc")};
      $("fromIn").value="📍 "+t("myLoc");
      saveLastLoc(lat,lng);                       // keep for fallback next time
    },
    err=>{
      const last=getLastLoc();                    // fresh fix failed → labelled fallback
      if(last){
        const m=Math.max(1,Math.round((Date.now()-last.ts)/60000));
        fromSel={lat:last.lat,lng:last.lng,label:t("myLoc")};
        $("fromIn").value="📍 "+t("lastLoc", m+" "+t("min"));
      }else{
        $("fromIn").value="";                     // no fallback → offer to ask again
        if(!retrying && confirm(t("locRetry", err.message))){ useGps(true); return; }
        alert(t("locFail", err.message));
      }
    },
    {enableHighAccuracy:true, timeout:GPS_TIMEOUT, maximumAge:GPS_MAX_AGE}
  );
}

async function runPlan(){
  if(!ready){ setStatus(`<span class="err">${t("stillLoading")}</span>`); return; }
  $("results").innerHTML=""; lastOptions=null;
  const from = fromSel || resolveText($("fromIn").value);
  const to   = toSel   || resolveText($("toIn").value);
  $("resolveHint").textContent="";
  if(!from){ setStatus(`<span class="err">${t("badFrom")}</span>`); return; }
  if(!to){ setStatus(`<span class="err">${t("badTo")}</span>`); return; }
  $("resolveHint").textContent = `${from.label} → ${to.label}`;
  setStatus(`<span class="spin"></span>${t("searching")}`);

  // 1) instant optimistic plan (assumed waits) for fast feedback
  let res = plan(from, to);
  if(res.error){ setStatus(`<span class="err">${res.error}</span>`); return; }
  renderOptions(res.options);
  setStatus(`<span class="spin"></span>${t("gettingEta")}`);

  // 2) live-ETA loop: drop routes with no bus right now, re-plan to surface the
  //    real alternative (the search keeps only one journey per transfer count,
  //    so a non-running winner would otherwise hide a perfectly good option).
  try{
    const cache=new Map();      // stopId -> eta rows (or null if fetch failed)
    const blocked=new Set();    // rk's confirmed not running now
    const found=new Map();      // sig -> journey whose every leg has a live bus
    let fetchFailed=false;
    for(let iter=0; iter<REPLAN_MAX; iter++){
      await fetchEtaInto(res.options, cache);
      applyEta(res.options, cache);
      let addedBlock=false;
      for(const o of res.options){
        if(o.legs.some(l=>l.etaList===null)) fetchFailed=true;
        if(o.legs.every(l=>!l.noBus)){
          const sig=sigOf(o); if(!found.has(sig)) found.set(sig,o);
        }else{
          for(const l of o.legs) if(l.noBus && !blocked.has(l.rk)){ blocked.add(l.rk); addedBlock=true; }
        }
      }
      if(found.size>=TOP_SHOW || !addedBlock) break;
      const re=plan(from, to, blocked);
      if(re.error) break;
      res=re;
    }

    let finalOptions=[...found.values()];
    let fallback=false;
    if(!finalOptions.length){
      // nothing on the sensible routes is running now → show scheduled estimates, flagged
      const re=plan(from, to);
      if(!re.error){ await fetchEtaInto(re.options, cache); applyEta(re.options, cache); finalOptions=re.options; }
      fallback=true;
    }
    if(!finalOptions.length){ setStatus(`<span class="err">${t("noCombo")}</span>`); return; }

    scoreAll(finalOptions);
    finalOptions.sort((a,b)=>a.totalMin-b.totalMin);
    renderOptions(finalOptions);
    if(fetchFailed)   setStatus(t("summaryEst", from.label, to.label));
    else if(fallback) setStatus(`<span class="err">${t("noneRunning")}</span>`);
    else              setStatus(t("summary", from.label, to.label, finalOptions.length));
  }catch(e){
    setStatus(t("summaryEst", from.label, to.label));
  }
}

init();
</script>
